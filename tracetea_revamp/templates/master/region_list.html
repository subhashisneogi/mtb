{% extends 'base.html' %}
{% load static %}

{% block title %}{% endblock %}
{% block page_header_title %}Region Master{% endblock %}

{% block css %}
<style>
    .master-search-box {
        max-width: 520px;
    }

    .search-status {
        min-height: 20px;
        font-size: 13px;
    }
</style>
{% endblock %}

{% block content %}
<div class="content-wrapper">
    <section class="content">
        <div class="container-fluid">
            <div class="row mb-3 ml-1 mr-1">
                <div class="col-sm-6">
                    <h6 class="font-weight-bold mt-3 text-muted">Region List</h6>
                </div>
                <div class="col-sm-6 text-right modalright">
                    <a type="button" href="{% url 'region_add' %}" class="btn bg-success2 text-white pl-3 pr-3">
                        <i class="fa fa-plus mr-2" aria-hidden="true"></i>Add New
                    </a>
                </div>
            </div>

            <div class="row ml-1 mr-1">
                <div class="col-lg-12">
                    <div class="white-box">
                        <label for="region-live-search" class="font-weight-bold text-muted">Search Region</label>
                        <input type="text"
                               id="region-live-search"
                               class="form-control master-search-box"
                               value="{{ search_query }}"
                               placeholder="Search region, abbreviation, state"
                               autocomplete="off"
                               data-list-url="{{ list_url }}">
                        <div id="region-search-status" class="search-status text-muted mt-2"></div>
                    </div>
                </div>
            </div>

            <div id="region-list-container" class="row ml-2 mr-2 mt-4">
                {% include 'master/_region_table.html' %}
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block js %}
<script>
    (function () {
        var input = document.getElementById('region-live-search');
        var container = document.getElementById('region-list-container');
        var status = document.getElementById('region-search-status');
        var timer = null;

        if (!input || !container) {
            return;
        }

        function buildUrl(page) {
            var url = new URL(input.dataset.listUrl, window.location.origin);
            var query = input.value.trim();
            if (query) {
                url.searchParams.set('q', query);
            }
            if (page) {
                url.searchParams.set('page', page);
            }
            return url;
        }

        function loadResults(page) {
            var url = buildUrl(page);
            status.textContent = 'Searching...';

            fetch(url, {headers: {'X-Requested-With': 'XMLHttpRequest'}})
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error('Search request failed');
                    }
                    return response.text();
                })
                .then(function (html) {
                    container.innerHTML = html;
                    window.history.replaceState({}, '', url);
                    status.textContent = '';
                })
                .catch(function () {
                    status.textContent = 'Unable to load results. Please try again.';
                });
        }

        input.addEventListener('input', function () {
            window.clearTimeout(timer);
            timer = window.setTimeout(function () {
                loadResults(1);
            }, 300);
        });

        container.addEventListener('click', function (event) {
            var link = event.target.closest('[data-page]');
            if (!link) {
                return;
            }
            event.preventDefault();
            loadResults(link.getAttribute('data-page'));
        });
    })();
</script>
{% endblock %}

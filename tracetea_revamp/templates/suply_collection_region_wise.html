{% load l10n %}
{% load poll_extras %}
<div class="card card-success mt-3" >
  <div class="card-header" id="invoice_card_id">

        <h3 class="card-title">Supply Collection for {{ year }}, Region - {{ region_details }}</h3>
  </div>
  <div class="card-body">
      <div class="chart">
        <canvas id="RegionleafCollectionEntityBarChart" style="width:100%;max-width:100%; height: 350px;"></canvas>
      </div>
  </div>
</div>

  <script>
    // Check if the chart has already been initialized
    if (typeof window.entityChart === 'undefined'){



      console.log("1st Time ###****")
        // Initial chart data
        const xValuesRegion = [{% for key, value in results %}'{{ key.0|month_name }}', {% endfor %}];
        const yValuesRegion = [{% for key, value in results %}{{ value.0| unlocalize }}, {% endfor %}];
       
        // Create the initial chart
        window.entityChart = new Chart("RegionleafCollectionEntityBarChart", {
            type: "bar",
            data: {
                labels: xValuesRegion,
                datasets: [{
                    backgroundColor: 'rgba(60,141,188,0.9)',
                    borderColor: 'rgba(60,141,188,0.8)',
                    pointRadius: false,
                    pointColor: '#3b8bba',
                    pointStrokeColor: 'rgba(60,141,188,1)',
                    pointHighlightFill: '#fff',
                    pointHighlightStroke: 'rgba(60,141,188,1)',
                    data: yValuesRegion // Ensure values are treated as numbers
                }]
            },
            options: {
                scales: {
                    yAxes: [{
                        ticks: {
                            beginAtZero: true,
                            // min: 0,  // Explicitly set the minimum value to 0
                            // precision: 0
                        }
                    }]
                },
                legend: { display: false },
                title: {
                    display: true,
                    text: "Total Collection in Year {{ year }} : {{ tot_net_weight|stringformat:".2f" }} Kg"
                }
            }
        });
    } else {

        console.log("2nd Time ###****")

        const xValuesRegion2 = [{% for key, value in results %}'{{ key.0|month_name }}', {% endfor %}];
        const yValuesRegion2 = [{% for key, value in results %}{{ value.0| unlocalize }}, {% endfor %}];
       

        // Create the initial chart
        window.entityChart = new Chart("RegionleafCollectionEntityBarChart", {
            type: "bar",
            data: {
                labels: xValuesRegion2,
                datasets: [{
                  backgroundColor: 'rgba(60,141,188,0.9)',
                  borderColor: 'rgba(60,141,188,0.8)',
                  pointRadius: false,
                  pointColor: '#3b8bba',
                  pointStrokeColor: 'rgba(60,141,188,1)',
                  pointHighlightFill: '#fff',
                  pointHighlightStroke: 'rgba(60,141,188,1)',
                    data: yValuesRegion2
                }]
            },
            options: {
                scales: {
                    yAxes: [{
                        ticks: {
                            beginAtZero: true,
                            // min: 0,  // Explicitly set the minimum value to 0
                            // precision: 0
                        }
                    }]
                },
                legend: { display: false },
                title: {
                    display: true,
                    text: "Total Collection in Year {{ year }} : {{ tot_net_weight|stringformat:".2f" }} Kg"
                }
            }
        });
    }

</script>

{% extends 'base.html' %}
{% load static %}

{% block page_header_title %}Vehicle Management{% endblock %}

{% block css %}
<style>
    .vehicle-search-box {
        min-height: 54px;
    }
    .search-status {
        font-size: 13px;
        min-height: 20px;
    }
    .vehicle-filter-box {
        border-radius: 8px;
        padding: 24px;
    }
    .vehicle-list-header {
        align-items: center;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
    }
    @media (max-width: 767px) {
        .vehicle-list-header .btn {
            width: 100%;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="content-wrapper">
    <section class="content">
        <div class="container-fluid">
            <div class="row mb-3 ml-1 mr-1">
                <div class="col-sm-12 vehicle-list-header">
                    <h6 class="font-weight-bold mt-3 text-muted">Vehicle List</h6>
                    <a href="{% url 'vehicle_management:vehicle_create' %}?next={{ current_list_url|urlencode }}"
                       class="btn bg-success2 text-white pl-3 pr-3">
                        <i class="fa fa-plus mr-2"></i>Add Vehicle
                    </a>
                </div>
            </div>

            <div class="row ml-1 mr-1">
                <div class="col-lg-12">
                    <div class="white-box vehicle-filter-box">
                        <label for="vehicle-live-search" class="font-weight-bold text-muted">Search Vehicle</label>
                        <input type="text"
                               id="vehicle-live-search"
                               class="form-control vehicle-search-box"
                               value="{{ search_query }}"
                               placeholder="Search vehicle number, type, mobile, created by"
                               autocomplete="off"
                               data-list-url="{{ list_url }}">
                        <div id="vehicle-search-status" class="search-status text-muted mt-2"></div>
                    </div>
                </div>
            </div>

            <div id="vehicle-list-container" class="row ml-2 mr-2 mt-4">
                {% include 'vehicle/_vehicle_table.html' %}
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block js %}
<script>
    (function () {
        var input = document.getElementById('vehicle-live-search');
        var container = document.getElementById('vehicle-list-container');
        var status = document.getElementById('vehicle-search-status');
        var timer = null;

        if (!input || !container) {
            return;
        }

        function buildUrl(page) {
            var url = new URL(input.dataset.listUrl, window.location.origin);
            var query = input.value.trim();
            if (query) {
                url.searchParams.set('q', query);
            }
            if (page) {
                url.searchParams.set('page', page);
            }
            return url;
        }

        function loadResults(page) {
            var url = buildUrl(page);
            status.textContent = 'Searching...';

            fetch(url, {
                headers: {'X-Requested-With': 'XMLHttpRequest'}
            })
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error('Search request failed');
                    }
                    return response.text();
                })
                .then(function (html) {
                    container.innerHTML = html;
                    window.history.replaceState({}, '', url);
                    status.textContent = '';
                })
                .catch(function () {
                    status.textContent = 'Unable to load results. Please try again.';
                });
        }

        input.addEventListener('input', function () {
            window.clearTimeout(timer);
            timer = window.setTimeout(function () {
                loadResults(1);
            }, 300);
        });

        container.addEventListener('click', function (event) {
            var link = event.target.closest('[data-page]');
            if (!link) {
                return;
            }
            event.preventDefault();
            loadResults(link.getAttribute('data-page'));
        });
    })();
</script>
{% endblock %}

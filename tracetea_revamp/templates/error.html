
{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- bootstrap -->
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">

    <!-- font awesome css -->
    <!-- <link rel="stylesheet" href="assets/css/font-awesome.min.css' %}"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">


    <!-- font family -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- full calender -->
    <link rel="stylesheet" href="{% static 'assets/css/main.css' %}">


    <!-- custom css -->
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/responsive.css' %}">

    <!-- fav icon -->
    <link rel="icon" type="image/png" href="{% static 'assets/images/fav-icon.png' %}">

    <title>AEGIDE</title>

<style> 
.loginbox {
	background: #ffffff;
	box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	width: 860px;
}       

.page-404{
		background:#ffffff ;
		}
				#notfound {
					position:relative;
					height:85vh;
				   }
				   #notfound .notfound {
					position:absolute;
					left:50%;
					top:50%;
					-webkit-transform:translate(-50%,-50%);
					-ms-transform:translate(-50%,-50%);
					transform:translate(-50%,-50%);
				   }
				   .notfound {
					max-width:460px;
					width:100%;
					text-align:center;
					line-height:1.4;
				   }
				   .notfound .notfound-404 {
					position:relative;
					width:180px;
					height:180px;
					margin:26px auto 50px;
				   }
                   .notfound .notfound-404>div:first-child {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    bottom: 0;
    background: #13ff68;
    -webkit-transform: rotate(45deg);
    -ms-transform: rotate(45deg);
    transform: rotate(45deg);
    border: 5px dashed #c6fbb7;
    border-radius: 5px;
}
				   .notfound .notfound-404>div:first-child:before {
					content:'';
					position:absolute;
					left:-5px;
					right:-5px;
					bottom:-5px;
					top:-5px;
					-webkit-box-shadow:0 0 0 5px rgba(0,0,0,.1) inset;
					box-shadow:0 0 0 5px rgba(0,0,0,.1) inset;
					border-radius:5px;
				   }
				   .notfound .notfound-404 h1 {
					font-family:cabin,sans-serif;
					color:#000;
					font-weight:700;
					margin:0;
					font-size:90px;
					position:absolute;
					top:50%;
					-webkit-transform:translate(-50%,-50%);
					-ms-transform:translate(-50%,-50%);
					transform:translate(-50%,-50%);
					left:50%;
					text-align:center;
					height:40px;
					line-height:40px;
				   }
				   .notfound h2 {
					font-family:cabin,sans-serif;
					font-size:33px;
					font-weight:700;
					text-transform:uppercase;
					letter-spacing:5px;
				   }
				   .notfound p {
					font-family:cabin,sans-serif;
					font-size:16px;
					color:#6f6f6f;
					font-weight:400;
					line-height: 1.5;
				   }
				   .notfound a {
					font-family:cabin,sans-serif;
					display:inline-block;
					padding:10px 25px;
					background-color:#0D7A3D;
					border:none;
					border-radius:40px;
					color:#fff;
					font-size:14px;
					font-weight:700;
					text-transform:uppercase;
					text-decoration:none;
					-webkit-transition:.2s all;
					transition:.2s all;
				   }
				   .notfound a:hover {
					background-color:#0D7A3D;
				   }
		</style>
</head>

<body>

    <!-- login section -->
    <section class="loginpage">
        <div class="loginbox page-404">
            <div class="container text-center">
                <div class="row">              

                    <div class="col-md-12 col-12 p-0 order-1 order-md-2">

                        <div id="notfound">
                            <div class="notfound">
                            <div class="notfound-404">
                            <div></div>
                            <h1>500</h1>
                            </div>
                            <h4>Something Went Wrong</h4>
                            <p>{{ error_message }}</p> <!-- Display the error message dynamically -->

                            <a href="/">Go to Home Page</a>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </section>




    <!-- JS Files -->
    <!-- bootstrap JS -->
    <script src="{% static 'assets/js/jquery.min.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>

    <!-- full calender -->
    <script src="{% static 'assets/js/main.js' %}"></script>

    <!-- Custom JS -->
    <script src="{% static 'assets/js/custom.js' %}"></script>



</body>

</html>

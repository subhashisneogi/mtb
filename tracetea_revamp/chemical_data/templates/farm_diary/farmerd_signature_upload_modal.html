
{% load static %}

<div class="modal fade" id="exampleModal{{ item.id }}" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Farmer Signature {{ item.name }}</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <button id="img-btn" class="btn btn-sm btn-success">
                    File Upload
                </button>
                <button id="digital-btn" class="btn btn-sm btn-success">
                    Digital Signature Upload
                </button>
                <div id="digital-file-upload">
                    <div class="container">
                        <div class="row">
                            <div class="col-md-12">
                                <h1>Digital-Signature</h1>
                                <p>Sign in the below</p>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <canvas id="signature-pad" class="signature-pad" width="620" height="160"></canvas>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <button id="clear-button" class="btn btn-secondary">Clear</button>
                                <button id="save-button" class="btn btn-primary">Save</button>
                            </div>
                        </div>
                    </div>
                </div>




                
                <div class="row">
                    <div class="col-md-12">
                        <img id="sig-image" src="" alt="Your signature will go here!" />
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

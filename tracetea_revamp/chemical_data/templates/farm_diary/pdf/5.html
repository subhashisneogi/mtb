<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Labour work Schedule</title>
        <style>
        table,
        td,
        div,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p {
            font-family: Arial, sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p {
            padding: 0;
            margin: 0;
        }

        img {
            width: 100%;
        }

        body {
            margin: 0;
            padding: 0;
        }
        table {
            width: 800px;
            border-collapse: collapse;
            border-spacing: 0;
            background: #f7f7f7;
            margin: 0px auto;
            border: 1px solid #43443d;
        }
   
        td {
            padding: 9px;
        }
        .backgrnd-color {
            background-color: #43443d;
        }
        table tr td h1 {
            color: #fff;
            text-align: center;
            font-size: 22px;
        }
        table tr td p {
            padding: 5px;
            font-size: 15px;
            line-height: 21px;
            word-break: break-all;

        }
        table tr td h3 {
            text-align: center;
            padding: 5px;
            color: #43443d;
            font-size: 16px;
        }
       .backgrnd-color h2 {
            color: #fff;
            font-size: 18px;
            padding: 8px;
            text-align: center;
        }
       
        .top-section img{
            height: 600px;
        }
        .bottom-sec img{
            height: 600px;
        }
        .top-section{
            width: 800px;
            margin: -4px auto;
        }
        .bottom-sec{
            width: 800px;
            margin: 0 auto;
        }
        .tble-heading td h6 {
            font-size: 12px;
            color: #43443d;
            padding: 5px;
            text-align: center;
        }
        .map-height {
            min-height: 400px;
        }

    .footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        text-align: center;
        padding: 15px 0;
        background-color: #fff;
    }
    .page-number {
        font-size: 14px;
        color: #333;
        position: absolute;
        bottom: 0px;
        text-align: centers;
        left: 0;
        right: 0;
    }
    .main-box{
        position: relative;
        min-height: 29.7cm;
        padding: 0;
        margin: 0;
    }
        </style>
    </head>
    <body>
        <div class="main-box">
            <table>
                <tr class="backgrnd-color">
                    <td colspan="2" style="border-bottom: 0;">
                        <h1>Map of the Land</h1>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <div class="map-height">
                            {% if map_details.map_area_master__map_image %}
                                <img src="{{ base_url }}{{ map_details.map_area_master__map_image }}" 
                                    alt="Map Image" 
                                    style="height: 500px; width: 500px;">
                            {% endif %}
                        </div>
                    </td>
                </tr>
                <tr style="border-top: 1px solid #000;">
                    <td colspan="2">
                        <h3 style="text-align: left !important; 
                    ">{{map_details.map_area_name__name}}:</h3>
                    </td>
                </tr>
                <tr>
                    <td style="width: 50%;">
                        <p>Total Area:&nbsp; {{ map_details.total_areas|default:'NA' }}&nbsp;(ha)</p>
                    </td>
                </tr>

            </table>
            <br>
            <br>
            <br>
            <div class="footer">
                <div class="page-number">
                    Page {{ current_page }} of {{ total_pages }}
                </div>
            </div>
        </div>
    </body>
</html>

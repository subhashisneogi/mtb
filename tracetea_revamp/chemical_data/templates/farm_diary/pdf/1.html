<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Labour work Schedule</title>
        <style>
    body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }
    img {
        width: 100%;
        height: auto;
    }
    .top-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        text-align: center;
        padding: 15px 0;
        background-color: #fff;
    }
    .page-number {
        font-size: 14px;
        color: #333;
        position: absolute;
        bottom: 0px;
        text-align: centers;
        left: 0;
        right: 0;
    }
    .main-box{
        position: relative;
        min-height: 29.7cm;
        padding: 0;
        margin: 0;
    }
        </style>
    </head>
    <body>
        <div class="main-box">
            <div class="top-section">
                <img src="https://tracetea.org/static/top.jpg" alt="">
            </div>
            <div class="footer">
                <div class="page-number">
                    Page {{ current_page }} of {{ total_pages }}
                </div>
            </div>
        </div>
    </body>
</html>
